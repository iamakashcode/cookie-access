# Nginx reverse proxy for the single Next.js app.
# The whole product (marketing site, dashboard, and /api/*) is served by one
# Next process on port 3000. The widget file itself is on Cloudflare R2, not here.
#
# 1. Replace app.yourdomain.com with your domain.
# 2. Get HTTPS: sudo certbot --nginx -d app.yourdomain.com
# 3. sudo nginx -t && sudo systemctl reload nginx

server {
    listen 80;
    server_name app.yourdomain.com;

    # Certbot will manage the 80→443 redirect + certificates after you run it.

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    # Slightly larger bodies for notice text / CSV, etc.
    client_max_body_size 2m;
}
